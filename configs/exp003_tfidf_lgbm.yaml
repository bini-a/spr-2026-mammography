experiment_name: exp003_tfidf_lgbm
notes: "LightGBM on TF-IDF features — non-linear baseline; feature_fraction=0.3 for high-dim sparse input"

seed: 42

data:
  n_folds: 5

features:
  word_tfidf:
    analyzer: word
    ngram_range: [1, 2]
    max_features: 150000
    sublinear_tf: true
    min_df: 2
  char_tfidf:
    analyzer: char_wb
    ngram_range: [2, 5]
    max_features: 150000
    sublinear_tf: true
    min_df: 3

model:
  type: lgbm
  params:
    n_estimators: 500
    num_leaves: 63
    learning_rate: 0.1
    feature_fraction: 0.3
    bagging_fraction: 0.8
    bagging_freq: 1
    min_child_samples: 5
    class_weight: balanced
    seed: 42

threshold:
  enabled: false
