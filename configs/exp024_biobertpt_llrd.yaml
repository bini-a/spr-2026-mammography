experiment_name: exp024_biobertpt_llrd
notes: "BioBERTpt-all with LLRD (decay=0.9) + patience=3. LLRD protects lower layers that encode clinical Portuguese knowledge from being overwritten during fine-tuning. Higher patience lets the model recover from bad epochs instead of stopping early."

seed: 42

gpu: all

data:
  n_folds: 5

model:
  type: transformer
  pretrained: pucpr/biobertpt-all
  max_length: 256

  params:
    epochs: 10
    batch_size: 64
    eval_batch_size: 128
    gradient_accumulation_steps: 1
    learning_rate: 2.0e-5        # head LR; lower layers get lr * 0.9^k
    warmup_ratio: 0.1
    weight_decay: 0.01
    fp16: true
    early_stopping_patience: 3   # up from 2 — gives model more recovery time
    loss_fn: cross_entropy
    llrd_decay: 0.9              # per-layer LR multiplier (1.0 = flat LR)

threshold:
  enabled: true

wandb:
  enabled: true
  project: spr-2026-mammography
  entity: null
  tags: [biobertpt, transformer, portuguese, clinical-pretraining, llrd, patience3]
