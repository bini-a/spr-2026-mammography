experiment_name: exp018_bertimbau_weighted_sampler
notes: "BERTimbau base + WeightedRandomSampler (weights ∝ 1/class_count). Every batch is oversampled toward rare classes (c5=29, c6=45) at the DataLoader level, on top of the existing class-weighted CE loss. Same honest pipeline as exp023 (group-aware K-fold + dedup)."

seed: 42

gpu: all

data:
  n_folds: 5

model:
  type: transformer
  pretrained: neuralmind/bert-base-portuguese-cased
  max_length: 256

  params:
    epochs: 10
    batch_size: 64
    eval_batch_size: 128
    gradient_accumulation_steps: 1
    learning_rate: 2.0e-5
    warmup_ratio: 0.1
    weight_decay: 0.01
    fp16: true
    early_stopping_patience: 2
    loss_fn: cross_entropy
    weighted_sampler: true

threshold:
  enabled: true

wandb:
  enabled: true
  project: spr-2026-mammography
  entity: null
  tags: [bertimbau, transformer, portuguese, weighted-sampler, honest, group-aware, dedup]
