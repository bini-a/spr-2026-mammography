experiment_name: exp011_bertimbau_ls
notes: "BERTimbau base + label smoothing (0.1) + early stopping — tests whether smoothing noisy labels helps vs plain CE; same setup as exp010 + label_smoothing=0.1"

seed: 42

gpu: all

data:
  n_folds: 5

model:
  type: transformer
  pretrained: neuralmind/bert-base-portuguese-cased
  max_length: 256

  params:
    epochs: 10
    batch_size: 64
    eval_batch_size: 128
    gradient_accumulation_steps: 1
    learning_rate: 2.0e-5
    warmup_ratio: 0.1
    weight_decay: 0.01
    fp16: true
    early_stopping_patience: 2
    loss_fn: cross_entropy
    label_smoothing: 0.1

threshold:
  enabled: true

wandb:
  enabled: true
  project: spr-2026-mammography
  entity: null
  tags: [bertimbau, transformer, portuguese, label-smoothing, early-stopping]
