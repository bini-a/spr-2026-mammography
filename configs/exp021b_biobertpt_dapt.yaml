experiment_name: exp021b_biobertpt_dapt
notes: "BioBERTpt-all + DAPT: 4-stage pipeline — (1) BERTimbau general PT-BR, (2) BioBERTpt clinical/biomedical, (3) DAPT on mammography reports, (4) task fine-tune. Run DAPT first: uv run python scripts/dapt_pretrain.py --pretrained pucpr/biobertpt-all --out models/biobertpt_dapt"

seed: 42

gpu: all

data:
  n_folds: 5

model:
  type: transformer
  pretrained: models/biobertpt_dapt   # generated by: uv run python scripts/dapt_pretrain.py --pretrained pucpr/biobertpt-all --out models/biobertpt_dapt
  max_length: 256

  params:
    epochs: 10
    batch_size: 64
    eval_batch_size: 128
    gradient_accumulation_steps: 1
    learning_rate: 1.5e-5    # lower than BERTimbau (2e-5) — model is already closer to target domain
    warmup_ratio: 0.1
    weight_decay: 0.01
    fp16: true
    early_stopping_patience: 2
    loss_fn: cross_entropy

threshold:
  enabled: true

wandb:
  enabled: true
  project: spr-2026-mammography
  entity: null
  tags: [biobertpt, transformer, portuguese, clinical-pretraining, dapt, domain-adaptation]
