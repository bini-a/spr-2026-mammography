# Experiment 001 — TF-IDF (word + char) + Logistic Regression
# Baseline. Expected OOF macro F1: ~0.55–0.65 depending on class 5/6 luck.

experiment_name: exp001_tfidf_logreg
notes: "Baseline: TF-IDF word+char bigrams, LogReg C=1, balanced weights"

seed: 42

data:
  n_folds: 5

features:
  word_tfidf:
    analyzer: word
    ngram_range: [1, 2]
    max_features: 150000
    sublinear_tf: true
    min_df: 2
  char_tfidf:
    analyzer: char_wb
    ngram_range: [2, 5]
    max_features: 150000
    sublinear_tf: true
    min_df: 3

model:
  type: logistic_regression
  params:
    C: 1.0
    max_iter: 2000
    class_weight: balanced
    solver: lbfgs
    seed: 42

threshold:
  enabled: false
