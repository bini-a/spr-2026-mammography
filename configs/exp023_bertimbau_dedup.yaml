experiment_name: exp023_bertimbau_dedup
notes: "BERTimbau base — honest re-run of exp010 with group-aware K-fold + dedup training (9131 unique texts). Establishes honest OOF baseline; previous exp010=0.765 was measured with leaky folds."

seed: 42

gpu: all

data:
  n_folds: 5

model:
  type: transformer
  pretrained: neuralmind/bert-base-portuguese-cased
  max_length: 256

  params:
    epochs: 10
    batch_size: 64
    eval_batch_size: 128
    gradient_accumulation_steps: 1
    learning_rate: 2.0e-5
    warmup_ratio: 0.1
    weight_decay: 0.01
    fp16: true
    early_stopping_patience: 2
    loss_fn: cross_entropy

threshold:
  enabled: true

wandb:
  enabled: true
  project: spr-2026-mammography
  entity: null
  tags: [bertimbau, transformer, portuguese, early-stopping, dedup, group-aware]
