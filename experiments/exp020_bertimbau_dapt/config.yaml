experiment_name: exp020_bertimbau_dapt
notes: "DAPT → fine-tune: BERTimbau continued MLM on mammography reports (scripts/dapt_pretrain.py), then task fine-tune. Tests whether closing the web-crawl→radiology domain gap improves representation."

seed: 42

gpu: all

data:
  n_folds: 5

model:
  type: transformer
  pretrained: models/bertimbau_dapt   # generated by: uv run python scripts/dapt_pretrain.py
  max_length: 256

  params:
    epochs: 10
    batch_size: 64
    eval_batch_size: 128
    gradient_accumulation_steps: 1
    learning_rate: 2.0e-5
    warmup_ratio: 0.1
    weight_decay: 0.01
    fp16: true
    early_stopping_patience: 2
    loss_fn: cross_entropy

threshold:
  enabled: true

wandb:
  enabled: true
  project: spr-2026-mammography
  entity: null
  tags: [bertimbau, transformer, portuguese, dapt, domain-adaptation]
