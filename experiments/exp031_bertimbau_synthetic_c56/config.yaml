experiment_name: exp031_bertimbau_synthetic_c56
notes: "BERTimbau base + weighted synthetic augmentation for extreme-rare classes {5,6} only (90 rows). Synthetic rows train with loss_weight=0.5 so c5/c6 signal is added without letting synthetic templates dominate real-report supervision."

seed: 42

gpu: all

data:
  n_folds: 5

model:
  type: transformer
  pretrained: neuralmind/bert-base-portuguese-cased
  max_length: 256

  params:
    epochs: 10
    batch_size: 64
    eval_batch_size: 128
    gradient_accumulation_steps: 1
    learning_rate: 2.0e-5
    warmup_ratio: 0.1
    weight_decay: 0.01
    fp16: true
    early_stopping_patience: 2
    loss_fn: cross_entropy

synthetic_augment:
  enabled: true
  classes: [5, 6]   # extreme-rare only: c5=36, c6=54 synthetic rows
  loss_weight: 0.5  # real rows weight 1.0; synthetic rows contribute half-loss each

threshold:
  enabled: true

wandb:
  enabled: true
  project: spr-2026-mammography
  entity: null
  tags: [bertimbau, synthetic, augmentation, c5, c6, weighted]
