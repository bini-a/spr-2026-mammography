experiment_name: exp030_bertimbau_synthetic_rare
notes: "BERTimbau base + synthetic augmentation for rare classes {0,3,4,5,6}. Adds ~3,600 synthetic rows to training pool (never to OOF val). Tests whether competition-provided synthetic data lifts c3/c4/c5/c6."

seed: 42

gpu: all

data:
  n_folds: 5

model:
  type: transformer
  pretrained: neuralmind/bert-base-portuguese-cased
  max_length: 256

  params:
    epochs: 10
    batch_size: 64
    eval_batch_size: 128
    gradient_accumulation_steps: 1
    learning_rate: 2.0e-5
    warmup_ratio: 0.1
    weight_decay: 0.01
    fp16: true
    early_stopping_patience: 2
    loss_fn: cross_entropy

synthetic_augment:
  enabled: true
  classes: [0, 3, 4, 5, 6]   # add rare-class synthetic only; skip c1/c2 to avoid flooding

threshold:
  enabled: true

wandb:
  enabled: true
  project: spr-2026-mammography
  entity: null
  tags: [bertimbau, synthetic, augmentation, rare-classes]
