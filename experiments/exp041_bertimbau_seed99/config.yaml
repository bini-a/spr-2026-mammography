experiment_name: exp041_bertimbau_seed99
notes: "BERTimbau base with seed=99 for ensemble diversity. All other settings identical to exp023_bertimbau_dedup (honest baseline with dedup + group-aware folds). Will be added to exp025 4-seed ensemble to form a 5-seed BERT ensemble."

seed: 99

gpu: 1

data:
  n_folds: 5

model:
  type: transformer
  pretrained: neuralmind/bert-base-portuguese-cased
  max_length: 256

  params:
    epochs: 10
    batch_size: 64
    eval_batch_size: 128
    gradient_accumulation_steps: 1
    learning_rate: 2.0e-5
    warmup_ratio: 0.1
    weight_decay: 0.01
    fp16: true
    early_stopping_patience: 2
    loss_fn: cross_entropy

threshold:
  enabled: true

wandb:
  enabled: true
  project: spr-2026-mammography
  entity: null
  tags: [bertimbau, multiseed, seed99, honest]
