experiment_name: exp045_rdrop
notes: "BERTimbau base + R-Drop regularization (α=1.0). R-Drop applies KL-divergence consistency loss between two dropout-different forward passes per batch, forcing calibrated predictions especially for rare classes c5/c6. All other settings identical to exp023_bertimbau_dedup (honest baseline). Expected +0.005-0.015 OOF from regularization."

seed: 42

gpu: 0

data:
  n_folds: 5

model:
  type: transformer
  pretrained: neuralmind/bert-base-portuguese-cased
  max_length: 256

  params:
    epochs: 10
    batch_size: 64
    eval_batch_size: 128
    gradient_accumulation_steps: 1
    learning_rate: 2.0e-5
    warmup_ratio: 0.1
    weight_decay: 0.01
    fp16: true
    early_stopping_patience: 2
    loss_fn: cross_entropy
    rdrop_alpha: 1.0

threshold:
  enabled: true

wandb:
  enabled: true
  project: spr-2026-mammography
  entity: null
  tags: [bertimbau, rdrop, regularization]
