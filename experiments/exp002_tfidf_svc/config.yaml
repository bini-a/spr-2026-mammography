experiment_name: exp002_tfidf_svc
notes: "LinearSVC baseline — same TF-IDF as exp001, swap LR for SVC with isotonic calibration"

seed: 42

data:
  n_folds: 5

features:
  word_tfidf:
    analyzer: word
    ngram_range: [1, 2]
    max_features: 150000
    sublinear_tf: true
    min_df: 2
  char_tfidf:
    analyzer: char_wb
    ngram_range: [2, 5]
    max_features: 150000
    sublinear_tf: true
    min_df: 3

model:
  type: linear_svc
  params:
    C: 1.0
    max_iter: 2000
    class_weight: balanced
    seed: 42

threshold:
  enabled: false
