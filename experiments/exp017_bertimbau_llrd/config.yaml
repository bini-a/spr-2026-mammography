experiment_name: exp017_bertimbau_llrd
notes: "BERTimbau base + LLRD (decay=0.9). Head/classifier gets lr=2e-5; each encoder layer below gets lr × 0.9^k; embeddings get lr × 0.9^12 ≈ 5.65e-6. Preserves pretrained lower-layer PT-BR representations while allowing fast task adaptation at the top. Same honest pipeline as exp023 (group-aware K-fold + dedup)."

seed: 42

gpu: all

data:
  n_folds: 5

model:
  type: transformer
  pretrained: neuralmind/bert-base-portuguese-cased
  max_length: 256

  params:
    epochs: 10
    batch_size: 64
    eval_batch_size: 128
    gradient_accumulation_steps: 1
    learning_rate: 2.0e-5        # head LR; lower layers get lr * 0.9^k
    warmup_ratio: 0.1
    weight_decay: 0.01
    fp16: true
    early_stopping_patience: 2
    loss_fn: cross_entropy
    llrd_decay: 0.9              # per-layer LR multiplier (1.0 = flat LR)

threshold:
  enabled: true

wandb:
  enabled: true
  project: spr-2026-mammography
  entity: null
  tags: [bertimbau, transformer, portuguese, llrd, honest, group-aware, dedup]
