experiment_name: exp004_bertimbau
notes: "BERTimbau base (neuralmind/bert-base-portuguese-cased, MIT license) — Portuguese BERT, 5-fold OOF, 5 epochs, AdamW lr=2e-5, class-weighted CE, FP16, 2×RTX6000Ada"

seed: 42

# gpu: all        → use both GPUs via DataParallel (fastest single experiment)
# gpu: 0          → GPU 0 only (run a second experiment on GPU 1 in parallel)
# gpu: 1          → GPU 1 only
# gpu: [0, 1]     → explicit multi-GPU (same as 'all' on this machine)
gpu: all

data:
  n_folds: 5

model:
  type: transformer
  pretrained: neuralmind/bert-base-portuguese-cased
  max_length: 512

  params:
    epochs: 5
    batch_size: 32          # DataParallel splits this across both GPUs → 16 per GPU
    eval_batch_size: 64
    gradient_accumulation_steps: 1
    learning_rate: 2.0e-5
    warmup_ratio: 0.1
    weight_decay: 0.01
    fp16: true

threshold:
  enabled: true             # OOF threshold tuning — important for rare classes 4/5/6

wandb:
  enabled: true
  project: spr-2026-mammography
  entity: null              # your wandb username/org; null = default account
  tags: [bertimbau, transformer, portuguese]
